services:
  db:
    image: postgres:15-alpine
    container_name: arch_bot_db
    restart: always
    environment:
      POSTGRES_USER: ${DB_USER}
      POSTGRES_PASSWORD: ${DB_PASSWORD}
      POSTGRES_DB: arch_bot
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U user -d arch_bot"]
      interval: 5s
      timeout: 5s
      retries: 5

  migrate:
    image: migrate/migrate
    container_name: arch_bot_migrate
    volumes:
      - ./migrations:/migrations
    command: [
      "-path", "/migrations",
      "-database", "postgres://user:password@db:5432/arch_bot?sslmode=disable",
      "up"
    ]
    depends_on:
      db:
        condition: service_healthy

  bot:
    build: .
    container_name: arch_bot
    restart: always
    depends_on:
      migrate:
        condition: service_completed_successfully
    env_file:
      - .env

volumes:
  postgres_data:
